<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ViGenAI - Premium AI Video Generator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#050508;color:#E8E0D0;font-family:'Rajdhani',system-ui,sans-serif;}
    ::-webkit-scrollbar{width:4px;}
    ::-webkit-scrollbar-thumb{background:rgba(255,215,0,0.2);border-radius:2px;}
    @keyframes glow{0%,100%{box-shadow:0 0 20px rgba(255,215,0,0.3);}50%{box-shadow:0 0 40px rgba(255,215,0,0.6);}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useRef}=React;
const MODELS=[
  {id:"veo",name:"Veo 3.1",badge:"CINEMATIC",color:"#FFD700",desc:"Best realism & physics"},
  {id:"kling",name:"Kling 3.0",badge:"TOP MOTION",color:"#00FFCC",desc:"Human motion specialist"},
  {id:"seedance",name:"Seedance 2.0",badge:"AUDIO+VIDEO",color:"#FF6B35",desc:"Native audio sync"},
  {id:"runway",name:"Runway Gen-4",badge:"CINEMATIC",color:"#A78BFA",desc:"Pro filmmaker workflow"},
  {id:"realmotion",name:"RealMotion 3.1",badge:"FAST",color:"#34D399",desc:"30s generation speed"},
  {id:"minimax",name:"MiniMax 2.3",badge:"BUDGET",color:"#60A5FA",desc:"Best value quality"},
];
const DURATIONS=["15s","30s","1 min","3 min","5 min","10 min"];
const RESOLUTIONS=["1080p","2K","4K","8K"];
const FRAMERATES=["24fps","30fps","60fps","120fps"];
const RATIOS=["16:9","9:16","1:1","21:9"];
const VIDEOS=[
  {id:1,title:"Neon Tokyo Drift",author:"NightWave",duration:"2:34",model:"Veo 3.1",views:"1.2M",bg:"linear-gradient(135deg,#667eea,#764ba2)",e:"🌆"},
  {id:2,title:"Ocean Storm 4K",author:"WaveForge",duration:"5:12",model:"Kling 3.0",views:"890K",bg:"linear-gradient(135deg,#0f2027,#2c5364)",e:"🌊"},
  {id:3,title:"Desert Mirage",author:"SandDune",duration:"1:45",model:"Seedance",views:"2.1M",bg:"linear-gradient(135deg,#f7971e,#ffd200)",e:"🏜️"},
  {id:4,title:"Forest Spirit",author:"GreenMind",duration:"3:20",model:"RealMotion",views:"445K",bg:"linear-gradient(135deg,#134e5e,#71b280)",e:"🌲"},
  {id:5,title:"Cyber Metropolis",author:"NeonPunk",duration:"8:05",model:"Runway Gen-4",views:"3.4M",bg:"linear-gradient(135deg,#1a1a2e,#0f3460)",e:"🤖"},
  {id:6,title:"Aurora Borealis",author:"PolarLight",duration:"4:50",model:"Veo 3.1",views:"988K",bg:"linear-gradient(135deg,#00b4db,#0083b0)",e:"🌌"},
  {id:7,title:"Ancient Ruins",author:"TimeLost",duration:"6:30",model:"Kling 3.0",views:"677K",bg:"linear-gradient(135deg,#8B6914,#C9A84C)",e:"🏛️"},
  {id:8,title:"Volcano Eruption",author:"MagmaCore",duration:"2:15",model:"MiniMax",views:"5.6M",bg:"linear-gradient(135deg,#FF4500,#FF8C00)",e:"🌋"},
  {id:9,title:"Space Station",author:"OrbitX",duration:"10:00",model:"Veo 3.1",views:"1.8M",bg:"linear-gradient(135deg,#0d0d0d,#1a1a4e)",e:"🚀"},
];
const PLANS=[
  {name:"FREE",price:"$0",period:"forever",color:"#6B7280",cta:"Get Started",features:["5 videos/day","Up to 1 min","1080p","No watermark","3 AI models"],missing:["4K/8K","10 min videos","Character Lock","Audio generation"]},
  {name:"PRO",price:"$24",period:"per month",color:"#FFD700",badge:"MOST POPULAR",cta:"Start Pro",features:["Unlimited videos","Up to 5 min","Up to 4K","No watermark","All 6 models","Character Lock","Audio generation","Priority queue","Cinematic mode"],missing:["8K","10 min videos"]},
  {name:"STUDIO",price:"$89",period:"per month",color:"#FF6B35",badge:"PROFESSIONAL",cta:"Go Studio",features:["Unlimited everything","Up to 10 min","8K resolution","No watermark","All models","Character Lock","Audio generation","Instant priority","API access","Commercial license"],missing:[]},
];

function Chip({active,onClick,children,color="#FFD700"}){
  return <button onClick={onClick} style={{padding:"5px 9px",borderRadius:6,cursor:"pointer",fontSize:10,border:`1px solid ${active?color+"60":"rgba(255,255,255,0.06)"}`,background:active?color+"15":"rgba(255,255,255,0.02)",color:active?color:"#6B7280",fontFamily:"inherit",fontWeight:active?700:400,transition:"all 0.15s",whiteSpace:"nowrap"}}>{children}</button>;
}
function Toggle({label,sub,value,onChange}){
  return <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0"}}>
    <div><div style={{fontSize:12,color:"#9CA3AF"}}>{label}</div>{sub&&<div style={{fontSize:9,color:"#374151",marginTop:2}}>{sub}</div>}</div>
    <button onClick={()=>onChange(!value)} style={{width:36,height:20,borderRadius:10,border:"none",cursor:"pointer",background:value?"linear-gradient(90deg,#FFD700,#FF6B35)":"rgba(255,255,255,0.08)",position:"relative",transition:"all 0.2s",flexShrink:0}}>
      <div style={{width:14,height:14,borderRadius:7,background:"#fff",position:"absolute",top:3,left:value?19:3,transition:"left 0.2s"}}/>
    </button>
  </div>;
}

function App(){
  const[nav,setNav]=useState("home");
  const[mode,setMode]=useState("text");
  const[mdl,setMdl]=useState("veo");
  const[dur,setDur]=useState("1 min");
  const[res,setRes]=useState("4K");
  const[fps,setFps]=useState("24fps");
  const[ratio,setRatio]=useState("16:9");
  const[prompt,setPrompt]=useState("");
  const[gen,setGen]=useState(false);
  const[prog,setProg]=useState(0);
  const[motion,setMotion]=useState(65);
  const[cin,setCin]=useState(true);
  const[lock,setLock]=useState(false);
  const[aud,setAud]=useState(true);
  const[enh,setEnh]=useState(false);
  const[done,setDone]=useState(null);
  const[img,setImg]=useState(null);
  const fRef=useRef();

  const generate=()=>{
    if(!prompt&&mode==="text")return;
    setGen(true);setProg(0);setDone(null);
    let p=0;
    const iv=setInterval(()=>{
      p+=Math.random()*3+1;
      if(p>=100){p=100;clearInterval(iv);setTimeout(()=>{setGen(false);setDone({mdl,dur,res});},400);}
      setProg(Math.min(p,100));
    },120);
  };

  const enhance=async()=>{
    if(!prompt)return;
    setEnh(true);
    await new Promise(r=>setTimeout(r,1800));
    setPrompt(prompt+", ultra-cinematic 8K, dramatic lighting, photorealistic, smooth camera motion, professional color grade, HDR, atmospheric depth of field");
    setEnh(false);
  };

  const selM=MODELS.find(m=>m.id===mdl);
  const NAV=[{id:"home",icon:"⚡",label:"Studio"},{id:"explore",icon:"🎬",label:"Explore"},{id:"pricing",icon:"💎",label:"Pricing"}];

  return <div style={{minHeight:"100vh",background:"#050508",display:"flex"}}>
    {/* Sidebar */}
    <div style={{width:62,background:"rgba(8,8,14,0.98)",borderRight:"1px solid rgba(255,215,0,0.07)",display:"flex",flexDirection:"column",alignItems:"center",padding:"14px 0",gap:6,position:"fixed",left:0,top:0,bottom:0,zIndex:100}}>
      <div style={{width:36,height:36,background:"linear-gradient(135deg,#FFD700,#FF6B35)",borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,marginBottom:18,animation:"glow 2s infinite"}}>⚡</div>
      {NAV.map(n=><button key={n.id} onClick={()=>setNav(n.id)} style={{width:44,height:44,borderRadius:10,border:`1px solid ${nav===n.id?"rgba(255,215,0,0.3)":"transparent"}`,background:nav===n.id?"rgba(255,215,0,0.08)":"transparent",color:nav===n.id?"#FFD700":"#4B5563",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:17,gap:2,transition:"all 0.2s"}}>
        <span>{n.icon}</span><span style={{fontSize:7,fontFamily:"monospace"}}>{n.label}</span>
      </button>)}
    </div>

    {/* Main */}
    <div style={{marginLeft:62,flex:1,display:"flex",flexDirection:"column"}}>
      <div style={{height:50,background:"rgba(5,5,8,0.95)",borderBottom:"1px solid rgba(255,215,0,0.05)",display:"flex",alignItems:"center",padding:"0 18px",gap:10,position:"sticky",top:0,zIndex:50}}>
        <span style={{fontSize:15,fontWeight:800,letterSpacing:4,background:"linear-gradient(90deg,#FFD700,#FF6B35)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>VIGENAI</span>
        <span style={{fontSize:8,padding:"2px 7px",borderRadius:4,background:"rgba(255,215,0,0.08)",border:"1px solid rgba(255,215,0,0.15)",color:"#FFD700",letterSpacing:2,fontFamily:"monospace"}}>STUDIO</span>
        <div style={{flex:1}}/>
        <div style={{width:6,height:6,borderRadius:"50%",background:"#34D399",boxShadow:"0 0 7px #34D399"}}/>
        <span style={{fontSize:8,color:"#34D399",letterSpacing:1,fontFamily:"monospace"}}>LIVE</span>
      </div>

      <div style={{flex:1,overflowY:"auto",padding:18}}>

        {nav==="home"&&<div style={{display:"grid",gridTemplateColumns:"1fr 290px",gap:14,maxWidth:1080}}>
          <div>
            {/* Mode tabs */}
            <div style={{display:"flex",gap:3,background:"rgba(255,255,255,0.02)",borderRadius:9,padding:3,border:"1px solid rgba(255,215,0,0.06)",marginBottom:14}}>
              {[["text","📝 Text to Video"],["image","🖼 Image to Video"],["script","📜 Script to Film"],["storyboard","🎞 Storyboard"]].map(([id,label])=>(
                <button key={id} onClick={()=>setMode(id)} style={{flex:1,padding:"7px 3px",borderRadius:7,border:"none",background:mode===id?"rgba(255,215,0,0.1)":"transparent",color:mode===id?"#FFD700":"#4B5563",cursor:"pointer",fontSize:10,fontWeight:600,fontFamily:"inherit",borderBottom:mode===id?"2px solid #FFD700":"2px solid transparent",transition:"all 0.2s"}}>{label}</button>
              ))}
            </div>

            {(mode==="text"||mode==="script")&&<div style={{position:"relative",marginBottom:14}}>
              <textarea value={prompt} onChange={e=>setPrompt(e.target.value)} placeholder={mode==="script"?"Paste your full script here. ViGenAI auto-detects scenes...\n\nScene 1: A lone astronaut drifts through deep space...\nScene 2: She spots a mysterious signal from a distant moon...":"Describe your video in detail...\n\nEXAMPLE: Cinematic slow-motion golden wheat fields at sunset, camera gliding low, warm amber light, photorealistic 8K..."} style={{width:"100%",minHeight:150,background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,215,0,0.12)",borderRadius:11,padding:"12px 12px 42px",color:"#E8E0D0",fontSize:12,lineHeight:1.7,resize:"vertical",fontFamily:"inherit",outline:"none"}}/>
              <button onClick={enhance} disabled={enh||!prompt} style={{position:"absolute",bottom:9,right:9,padding:"5px 11px",borderRadius:6,background:"rgba(255,215,0,0.1)",border:"1px solid rgba(255,215,0,0.25)",color:"#FFD700",cursor:"pointer",fontSize:9,fontFamily:"inherit",letterSpacing:1,fontWeight:700}}>{enh?"✨ ENHANCING...":"✨ ENHANCE"}</button>
            </div>}

            {(mode==="image"||mode==="storyboard")&&<div onDragOver={e=>{e.preventDefault();}} onDrop={e=>{e.preventDefault();const f=e.dataTransfer.files[0];if(f)setImg(URL.createObjectURL(f));}} onClick={()=>fRef.current?.click()} style={{minHeight:150,borderRadius:11,border:"2px dashed rgba(255,215,0,0.2)",background:"rgba(255,255,255,0.01)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",marginBottom:14}}>
              {img?<img src={img} alt="" style={{maxHeight:140,maxWidth:"100%",borderRadius:8,objectFit:"contain"}}/>:<><div style={{fontSize:30,marginBottom:8}}>🎞</div><div style={{color:"#FFD700",fontSize:11,fontWeight:700,letterSpacing:2}}>DROP IMAGE HERE</div><div style={{color:"#374151",fontSize:9,marginTop:4}}>or tap to browse</div></>}
              <input ref={fRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(f)setImg(URL.createObjectURL(f));}}/>
            </div>}

            {/* Models */}
            <div style={{marginBottom:14}}>
              <div style={{fontSize:9,letterSpacing:3,color:"#4B5563",marginBottom:9,fontFamily:"monospace"}}>AI MODEL</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:7}}>
                {MODELS.map(m=><button key={m.id} onClick={()=>setMdl(m.id)} style={{padding:"9px 9px",borderRadius:9,cursor:"pointer",border:`1px solid ${mdl===m.id?m.color+"50":"rgba(255,255,255,0.05)"}`,background:mdl===m.id?m.color+"10":"rgba(255,255,255,0.02)",textAlign:"left",fontFamily:"inherit",transition:"all 0.2s"}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                    <span style={{fontSize:10,fontWeight:700,color:mdl===m.id?m.color:"#6B7280"}}>{m.name}</span>
                    <span style={{fontSize:6,padding:"1px 4px",borderRadius:3,background:m.color+"20",color:m.color}}>{m.badge}</span>
                  </div>
                  <div style={{fontSize:8,color:"#374151"}}>{m.desc}</div>
                </button>)}
              </div>
            </div>

            {/* Generate */}
            {gen?<div style={{background:"rgba(255,215,0,0.04)",border:"1px solid rgba(255,215,0,0.15)",borderRadius:11,padding:16}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:9,fontSize:11}}>
                <span style={{color:"#FFD700",letterSpacing:2}}>⚡ GENERATING...</span>
                <span style={{color:"#6B7280",fontFamily:"monospace"}}>{Math.round(prog)}%</span>
              </div>
              <div style={{height:3,background:"rgba(255,255,255,0.05)",borderRadius:2,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${prog}%`,background:"linear-gradient(90deg,#FFD700,#FF6B35)",borderRadius:2,transition:"width 0.1s"}}/>
              </div>
              <div style={{marginTop:7,fontSize:8,color:"#374151",fontFamily:"monospace"}}>{prog<25?"Initializing model...":prog<50?"Generating scene structure...":prog<75?"Rendering frames...":prog<90?"Applying cinematic grade...":`Upscaling to ${res}...`}</div>
            </div>:done?<div style={{background:"rgba(52,211,153,0.05)",border:"1px solid rgba(52,211,153,0.2)",borderRadius:11,padding:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{color:"#34D399",fontSize:12,fontWeight:700,letterSpacing:2}}>✅ VIDEO READY</div>
                <div style={{color:"#4B5563",fontSize:9,marginTop:4}}>{done.dur} · {done.res} · {MODELS.find(m=>m.id===done.mdl)?.name}</div>
              </div>
              <div style={{display:"flex",gap:7}}>
                <button style={{padding:"6px 12px",borderRadius:7,background:"rgba(52,211,153,0.12)",border:"1px solid rgba(52,211,153,0.25)",color:"#34D399",cursor:"pointer",fontSize:10,fontFamily:"inherit",fontWeight:700}}>▶ PREVIEW</button>
                <button style={{padding:"6px 12px",borderRadius:7,background:"rgba(255,215,0,0.12)",border:"1px solid rgba(255,215,0,0.25)",color:"#FFD700",cursor:"pointer",fontSize:10,fontFamily:"inherit",fontWeight:700}}>⬇ DOWNLOAD</button>
              </div>
            </div>:<button onClick={generate} disabled={!prompt&&mode==="text"} style={{width:"100%",padding:"14px 0",borderRadius:11,border:"none",background:(!prompt&&mode==="text")?"rgba(255,255,255,0.04)":"linear-gradient(135deg,#FFD700,#FF6B35)",color:(!prompt&&mode==="text")?"#374151":"#050508",fontSize:13,fontWeight:800,letterSpacing:4,fontFamily:"inherit",cursor:(!prompt&&mode==="text")?"not-allowed":"pointer",transition:"all 0.3s",boxShadow:(!prompt&&mode==="text")?"none":"0 0 28px rgba(255,215,0,0.2)"}}>⚡ GENERATE VIDEO</button>}
          </div>

          {/* Settings panel */}
          <div>
            {[["OUTPUT SETTINGS",[
              ["DURATION",DURATIONS,dur,setDur],
              ["RESOLUTION",RESOLUTIONS,res,setRes],
              ["FRAME RATE",FRAMERATES,fps,setFps],
              ["ASPECT RATIO",RATIOS,ratio,setRatio],
            ]]].map(([t,settings])=><div key={t} style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.05)",borderRadius:11,padding:13,marginBottom:11}}>
              <div style={{fontSize:8,letterSpacing:3,color:"#4B5563",marginBottom:11,fontFamily:"monospace"}}>{t}</div>
              {settings.map(([l,opts,val,setter])=><div key={l} style={{marginBottom:10}}>
                <div style={{fontSize:8,color:"#374151",letterSpacing:2,marginBottom:6,fontFamily:"monospace"}}>{l}</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:4}}>{opts.map(o=><Chip key={o} active={val===o} onClick={()=>setter(o)}>{o}</Chip>)}</div>
              </div>)}
            </div>)}

            <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.05)",borderRadius:11,padding:13,marginBottom:11}}>
              <div style={{fontSize:8,letterSpacing:3,color:"#4B5563",marginBottom:10,fontFamily:"monospace"}}>MOTION INTENSITY</div>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:5,fontSize:9}}><span style={{color:"#374151"}}>SUBTLE</span><span style={{color:"#FFD700",fontFamily:"monospace"}}>{motion}%</span><span style={{color:"#374151"}}>INTENSE</span></div>
              <input type="range" min={0} max={100} value={motion} onChange={e=>setMotion(+e.target.value)} style={{width:"100%",accentColor:"#FFD700"}}/>
            </div>

            <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.05)",borderRadius:11,padding:13,marginBottom:11}}>
              <div style={{fontSize:8,letterSpacing:3,color:"#4B5563",marginBottom:10,fontFamily:"monospace"}}>FEATURES</div>
              <Toggle label="🎬 Cinematic Mode" sub="Film grain, HDR, color grade" value={cin} onChange={setCin}/>
              <Toggle label="🔒 Character Lock" sub="Consistent faces across scenes" value={lock} onChange={setLock}/>
              <Toggle label="🔊 Audio Generation" sub="Synced SFX, ambient & music" value={aud} onChange={setAud}/>
            </div>

            <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.05)",borderRadius:11,padding:13}}>
              <div style={{fontSize:8,letterSpacing:3,color:"#4B5563",marginBottom:10,fontFamily:"monospace"}}>RENDER INFO</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5}}>
                {[["MODEL",selM?.name],["DURATION",dur],["RESOLUTION",res],["FPS",fps],["RATIO",ratio],["EST.",res==="8K"?"~12 min":res==="4K"?"~5 min":"~2 min"]].map(([l,v])=><div key={l} style={{background:"rgba(255,255,255,0.02)",borderRadius:6,padding:"6px 8px"}}>
                  <div style={{fontSize:7,color:"#374151",letterSpacing:2,fontFamily:"monospace",marginBottom:2}}>{l}</div>
                  <div style={{fontSize:10,color:"#FFD700",fontWeight:700}}>{v}</div>
                </div>)}
              </div>
            </div>
          </div>
        </div>}

        {nav==="explore"&&<div>
          <div style={{fontSize:18,fontWeight:800,letterSpacing:3,marginBottom:4}}>COMMUNITY FEED</div>
          <div style={{fontSize:10,color:"#4B5563",marginBottom:18}}>AI-generated videos from 5M+ creators worldwide</div>
          <div style={{columns:"3 220px",gap:10}}>
            {VIDEOS.map(v=><div key={v.id} style={{breakInside:"avoid",marginBottom:10,borderRadius:10,overflow:"hidden",border:"1px solid rgba(255,255,255,0.05)",cursor:"pointer"}}>
              <div style={{height:110+(v.id%3)*35,background:v.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:36,position:"relative"}}>
                {v.e}
                <div style={{position:"absolute",bottom:6,right:6,background:"rgba(0,0,0,0.7)",padding:"2px 6px",borderRadius:4,fontSize:8,fontFamily:"monospace",color:"#E8E0D0"}}>{v.duration}</div>
                <div style={{position:"absolute",top:6,left:6,background:"rgba(0,0,0,0.6)",padding:"2px 5px",borderRadius:4,fontSize:7,color:"#FFD700"}}>{v.model}</div>
              </div>
              <div style={{padding:"8px 10px",background:"rgba(255,255,255,0.02)"}}>
                <div style={{fontSize:11,fontWeight:700,color:"#E8E0D0",marginBottom:3}}>{v.title}</div>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:8,color:"#4B5563"}}>
                  <span>by {v.author}</span><span>👁 {v.views}</span>
                </div>
              </div>
            </div>)}
          </div>
        </div>}

        {nav==="pricing"&&<div>
          <div style={{textAlign:"center",marginBottom:28}}>
            <div style={{fontSize:22,fontWeight:800,letterSpacing:4,background:"linear-gradient(90deg,#FFD700,#FF6B35)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>TRANSPARENT PRICING</div>
            <div style={{color:"#4B5563",fontSize:11,marginTop:6}}>No hidden fees. No watermarks. No credit tricks.</div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,maxWidth:820,margin:"0 auto"}}>
            {PLANS.map(p=><div key={p.name} style={{background:p.name==="PRO"?"rgba(255,215,0,0.04)":"rgba(255,255,255,0.02)",border:`1px solid ${p.name==="PRO"?"rgba(255,215,0,0.2)":"rgba(255,255,255,0.05)"}`,borderRadius:13,padding:18,position:"relative",transform:p.name==="PRO"?"scale(1.02)":"scale(1)"}}>
              {p.badge&&<div style={{position:"absolute",top:-9,left:"50%",transform:"translateX(-50%)",padding:"2px 11px",borderRadius:20,background:`linear-gradient(90deg,${p.color},#FF6B35)`,fontSize:7,letterSpacing:2,fontWeight:800,color:"#050508",whiteSpace:"nowrap"}}>{p.badge}</div>}
              <div style={{fontSize:8,letterSpacing:4,color:p.color,marginBottom:5,fontFamily:"monospace"}}>{p.name}</div>
              <div style={{fontSize:28,fontWeight:800,color:"#E8E0D0",marginBottom:2}}>{p.price}</div>
              <div style={{fontSize:9,color:"#4B5563",marginBottom:14}}>{p.period}</div>
              <button style={{width:"100%",padding:"8px 0",borderRadius:7,border:"none",cursor:"pointer",background:p.name==="FREE"?"rgba(255,255,255,0.05)":`linear-gradient(135deg,${p.color},#FF6B35)`,color:p.name==="FREE"?"#6B7280":"#050508",fontWeight:800,letterSpacing:2,fontSize:10,fontFamily:"inherit",marginBottom:14}}>{p.cta}</button>
              <div style={{display:"flex",flexDirection:"column",gap:5}}>
                {p.features.map(f=><div key={f} style={{display:"flex",gap:6,fontSize:9,color:"#9CA3AF"}}><span style={{color:"#34D399"}}>✓</span>{f}</div>)}
                {p.missing.map(f=><div key={f} style={{display:"flex",gap:6,fontSize:9,color:"#374151"}}><span>✗</span>{f}</div>)}
              </div>
            </div>)}
          </div>
        </div>}

      </div>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
